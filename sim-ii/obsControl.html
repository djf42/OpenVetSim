<html>
  <head>

		<title>OBS Control</title>
		<script type="text/javascript" src="scripts/jquery/2.2.1/jquery.min.js"></script>
		<script type="text/javascript" src="scripts/obs-websocket-5.js"></script>
		
<script>
function GetURLParameter(sParam)
{
    var sPageURL = window.location.search.substring(1);
    var sURLVariables = sPageURL.split('&');
    for (var i = 0; i < sURLVariables.length; i++) 
    {
        var sParameterName = sURLVariables[i].split('=');
        if (sParameterName[0] == sParam) 
        {
            return sParameterName[1];
        }
    }
};

const obs = new OBSWebSocket();

$(document).ready(function() {
	var cmd = GetURLParameter('command');
	
	$("#cmd").append("command is "+cmd );

	obs.connect('ws://localhost:4455').then(
		function (){		
			$("#reply").append("ConnectOK\n " );	
			if ( cmd == 'start' )
			{
				obs.call('StartRecord').then(
					function(){$("#reply").append("Sent Start\n " ); obs.disconnect();},
					function(result){$("#reply").append("Start Failed\n " ); console.log(result); obs.disconnect();} );
			}
			else if ( cmd == 'stop' )
			{
				obs.call('StopRecord').then(
					function(){$("#reply").append("Sent Stop\n " ); obs.disconnect();},
					function(result){$("#reply").append("Stop Failed\n " ); console.log(result); obs.disconnect();} );
			}
		},
		function (result){
			$("#reply").append("ConnectFailed\n " );
			console.log(result);
		})
	.catch(function(){
		//$("#reply").append("Connect Error\n " );
	});

});

</script>

	</head>
	<body>
		<p>OBS Control</p>
		<p id='cmd'></p>
		<pre id='reply'></pre>
	</body>
</html>
